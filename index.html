<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0F6E56" />
  <title>ספריית עובדים</title>
  <link rel="manifest" href="manifest.json" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark:   #0F6E56;
      --green-mid:    #1D9E75;
      --green-light:  #E1F5EE;
      --green-border: #5DCAA5;
      --blue:         #185FA5;
      --blue-light:   #EAF1FB;
      --blue-border:  #85B7EB;
      --bg:           #F6F8F7;
      --surface:      #FFFFFF;
      --border:       #DDE4E1;
      --text-primary: #111F1A;
      --text-secondary:#5A706A;
      --radius-lg:    14px;
      --radius-md:    10px;
      --shadow:       0 1px 4px rgba(0,0,0,0.08);
    }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100dvh; direction: rtl; }
    .header { background: var(--green-dark); padding: 20px 16px 14px; position: sticky; top: 0; z-index: 10; }
    .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
    .app-title { font-size: 19px; font-weight: 600; color: #fff; }
    .employee-count { font-size: 12px; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.15); padding: 3px 10px; border-radius: 20px; }
    .search-wrap { position: relative; }
    .search-input { width: 100%; background: rgba(255,255,255,0.18); border: 1px solid rgba(255,255,255,0.25); border-radius: var(--radius-md); padding: 9px 36px 9px 12px; font-size: 14px; color: #fff; outline: none; }
    .search-input::placeholder { color: rgba(255,255,255,0.6); }
    .search-icon { position: absolute; right: 11px; top: 50%; transform: translateY(-50%); color: rgba(255,255,255,0.6); pointer-events: none; }
    .list-wrap { padding: 10px 12px 80px; display: flex; flex-direction: column; gap: 6px; }
    .employee-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; box-shadow: var(--shadow); cursor: pointer; transition: border-color 0.15s; }
    .employee-card.open { border-color: var(--green-border); }
    .card-main { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; background: var(--green-light); color: var(--green-dark); font-weight: 600; font-size: 15px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-info { flex: 1; min-width: 0; }
    .card-name { font-size: 15px; font-weight: 500; }
    .card-sub { font-size: 12px; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }
    .quick-btns { display: flex; gap: 6px; flex-shrink: 0; }
    .qbtn { width: 36px; height: 36px; border-radius: 50%; border: 1px solid var(--border); background: var(--bg); display: flex; align-items: center; justify-content: center; text-decoration: none; font-size: 17px; }
    .card-detail { display: none; border-top: 1px solid var(--green-light); background: var(--green-light); padding: 12px 14px; }
    .employee-card.open .card-detail { display: block; }
    .detail-row { font-size: 13px; color: var(--green-dark); margin-bottom: 4px; }
    .detail-row span { color: var(--text-secondary); }
    .detail-actions { display: flex; gap: 8px; margin-top: 10px; }
    .daction { flex: 1; padding: 9px 4px; border-radius: var(--radius-md); border: 1px solid var(--green-border); background: var(--surface); font-size: 13px; color: var(--green-dark); text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 5px; font-weight: 500; }
    .daction.mail { color: var(--blue); border-color: var(--blue-border); }
    .state-box { text-align: center; padding: 48px 24px; color: var(--text-secondary); }
    .state-box .icon { font-size: 36px; margin-bottom: 10px; }
    .state-box p { font-size: 14px; }
    .state-box .sub { font-size: 12px; margin-top: 6px; color: #9CB4AF; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--green-light); border-top-color: var(--green-dark); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 12px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .footer { position: fixed; bottom: 0; left: 0; right: 0; background: var(--surface); border-top: 1px solid var(--border); padding: 8px 16px; font-size: 11px; color: var(--text-secondary); text-align: center; }
  </style>
</head>
<body>
<header class="header">
  <div class="header-top">
    <div class="app-title">ספריית עובדים</div>
    <div class="employee-count" id="countBadge">…</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" type="search"
           placeholder="חיפוש לפי שם, אימייל או טלפון…"
           oninput="filterEmployees()" />
  </div>
</header>

<main class="list-wrap" id="listWrap">
  <div class="state-box">
    <div class="spinner"></div>
    <p>טוען נתונים…</p>
  </div>
</main>

<footer class="footer" id="footer"></footer>

<script>
// ══════════════════════════════════════════
//  ⚙️  הגדר כאן את ה-URL של ה-Worker שלך
//  לאחר שתיצור אותו ב-Cloudflare
// ══════════════════════════════════════════
const WORKER_URL = "https://YOUR_WORKER_NAME.YOUR_SUBDOMAIN.workers.dev";

// שמות עמודות בקובץ Excel
const COL_NAME  = "שם עובד";
const COL_EMAIL = "mail";
const COL_PHONE = "טלפון";
// ══════════════════════════════════════════

let allEmployees = [];
let openIdx = null;

function initials(name) {
  const p = name.trim().split(/\s+/);
  return p.length >= 2 ? p[1][0] + p[0][0] : p[0].substring(0,2);
}
function waLink(phone) {
  return "https://wa.me/972" + phone.replace(/\D/g,"").replace(/^0/,"");
}

function renderList(list) {
  const wrap = document.getElementById("listWrap");
  document.getElementById("countBadge").textContent = list.length + " עובדים";
  openIdx = null;
  if (list.length === 0) {
    wrap.innerHTML = `<div class="state-box"><div class="icon">🔍</div><p>לא נמצאו עובדים</p></div>`;
    return;
  }
  wrap.innerHTML = list.map((e,i) => `
    <div class="employee-card" id="card-${i}" onclick="toggleCard(${i})">
      <div class="card-main">
        <div class="avatar">${initials(e.name)}</div>
        <div class="card-info">
          <div class="card-name">${e.name}</div>
          <div class="card-sub">${e.email || e.phone}</div>
        </div>
        <div class="quick-btns" onclick="event.stopPropagation()">
          ${e.phone ? `<a class="qbtn" href="tel:${e.phone}">📞</a>` : ""}
          ${e.phone ? `<a class="qbtn" href="${waLink(e.phone)}">💬</a>` : ""}
          ${e.email ? `<a class="qbtn" href="mailto:${e.email}">✉️</a>` : ""}
        </div>
      </div>
      <div class="card-detail">
        ${e.phone ? `<div class="detail-row">📞 <span>${e.phone}</span></div>` : ""}
        ${e.email ? `<div class="detail-row">✉️ <span>${e.email}</span></div>` : ""}
        <div class="detail-actions">
          ${e.phone ? `<a class="daction" href="tel:${e.phone}">📞 התקשר</a>` : ""}
          ${e.phone ? `<a class="daction" href="${waLink(e.phone)}">💬 WhatsApp</a>` : ""}
          ${e.email ? `<a class="daction mail" href="mailto:${e.email}">✉️ מייל</a>` : ""}
        </div>
      </div>
    </div>`).join("");
}

function toggleCard(i) {
  if (openIdx !== null && openIdx !== i)
    document.getElementById("card-"+openIdx)?.classList.remove("open");
  const c = document.getElementById("card-"+i);
  c.classList.toggle("open");
  openIdx = c.classList.contains("open") ? i : null;
}

function filterEmployees() {
  const q = document.getElementById("searchInput").value.trim().toLowerCase();
  renderList(q ? allEmployees.filter(e =>
    e.name.toLowerCase().includes(q) ||
    e.email.toLowerCase().includes(q) ||
    e.phone.includes(q)) : allEmployees);
}

async function init() {
  const wrap = document.getElementById("listWrap");
  if (WORKER_URL.includes("YOUR_WORKER_NAME")) {
    wrap.innerHTML = `<div class="state-box"><div class="icon">⚙️</div><p>יש להגדיר את WORKER_URL בקובץ</p></div>`;
    return;
  }
  try {
    const res = await fetch(WORKER_URL);
    if (!res.ok) throw new Error("שגיאת שרת: " + res.status);
    const buffer = await res.arrayBuffer();
    const data = new Uint8Array(buffer);
    const wb = XLSX.read(data, { type: "array" });
    const rows = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { defval: "" });
    allEmployees = rows.map(r => ({
      name:  (r[COL_NAME]  || "").toString().trim(),
      email: (r[COL_EMAIL] || "").toString().trim(),
      phone: (r[COL_PHONE] || "").toString().trim(),
    })).filter(e => e.name);
    renderList(allEmployees);
    document.getElementById("footer").textContent = "עודכן: " + new Date().toLocaleString("he-IL");
  } catch(err) {
    wrap.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>שגיאה בטעינה</p><p class="sub">${err.message}</p></div>`;
  }
}

const s = document.createElement("script");
s.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
s.onload = init;
document.head.appendChild(s);
</script>
</body>
</html>
